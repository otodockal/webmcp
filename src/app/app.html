<div class="mx-auto flex min-h-screen max-w-lg flex-col gap-6 p-4 sm:p-8">
  <header
    class="flex items-center justify-between border-4 border-black bg-yellow-300 px-5 py-4 shadow-[8px_8px_0_0_#000]"
  >
    <span class="text-3xl font-bold uppercase tracking-tighter">WebMCP</span>
    <span
      class="border-2 border-black bg-black px-2 py-1 font-mono text-xs font-bold uppercase text-yellow-300"
    >
      agent ready
    </span>
  </header>

  <nav class="flex">
    <a
      routerLink="/"
      routerLinkActive="bg-black text-yellow-300"
      [routerLinkActiveOptions]="{ exact: true }"
      class="flex-1 border-4 border-black bg-white px-4 py-3 text-center text-sm font-bold uppercase tracking-widest transition-colors hover:bg-yellow-300"
    >
      Sign up
    </a>
    <a
      routerLink="/counter"
      routerLinkActive="bg-black text-yellow-300"
      class="flex-1 border-4 border-l-0 border-black bg-white px-4 py-3 text-center text-sm font-bold uppercase tracking-widest transition-colors hover:bg-yellow-300"
    >
      Counter
    </a>
    <a
      routerLink="/products"
      routerLinkActive="bg-black text-yellow-300"
      class="flex-1 border-4 border-l-0 border-black bg-white px-4 py-3 text-center text-sm font-bold uppercase tracking-widest transition-colors hover:bg-yellow-300"
    >
      Shop
    </a>
  </nav>

  <main class="border-4 border-black bg-white p-6 shadow-[8px_8px_0_0_#000] sm:p-8">
    <router-outlet />
  </main>
</div>
