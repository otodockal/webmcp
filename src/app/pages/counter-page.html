<section class="flex flex-col items-center gap-6 text-center">
  <h1 class="text-4xl font-bold uppercase tracking-tighter">Counter</h1>
  <p class="border-l-4 border-black bg-yellow-100 px-3 py-2 text-left text-sm font-medium">
    A browser AI agent can read and change this counter through the registered tools. You can also
    use the buttons.
  </p>

  <div class="flex items-center gap-4">
    <button
      type="button"
      class="h-14 w-14 border-4 border-black bg-pink-400 text-3xl font-bold leading-none shadow-[4px_4px_0_0_#000] transition-transform active:translate-x-1 active:translate-y-1 active:shadow-none"
      (click)="counter.decrement()"
    >
      −
    </button>
    <output
      class="min-w-24 border-4 border-black bg-cyan-300 px-4 py-3 font-mono text-5xl font-bold tabular-nums shadow-[4px_4px_0_0_#000]"
    >
      {{ counter.count() }}
    </output>
    <button
      type="button"
      class="h-14 w-14 border-4 border-black bg-lime-400 text-3xl font-bold leading-none shadow-[4px_4px_0_0_#000] transition-transform active:translate-x-1 active:translate-y-1 active:shadow-none"
      (click)="counter.increment()"
    >
      +
    </button>
  </div>

  <button
    type="button"
    class="border-4 border-black bg-white px-5 py-2 text-sm font-bold uppercase tracking-widest shadow-[4px_4px_0_0_#000] transition-transform hover:bg-yellow-300 active:translate-x-1 active:translate-y-1 active:shadow-none"
    (click)="counter.reset()"
  >
    Reset
  </button>
</section>
